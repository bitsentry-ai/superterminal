[changelog]
header = """
# Changelog

"""
body = """
{% if version %}
## {{ version }} - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}
## Unreleased
{% endif %}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}{% if commit.remote.pr_number %} ([#{{ commit.remote.pr_number }}](https://github.com/bitsentry-ai/bitsentry-monorepo/pull/{{ commit.remote.pr_number }})){% endif %}
{% endfor %}

{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
protect_breaking_commits = true
split_commits = false
tag_pattern = "^desktop-v[0-9].*"

commit_parsers = [
  { message = "^feat", group = "features" },
  { message = "^fix", group = "fixes" },
  { message = "^perf", group = "performance" },
  { message = "^refactor", group = "refactors" },
  { message = "^docs", group = "documentation" },
  { message = "^test", group = "tests" },
  { message = "^build", group = "build" },
  { message = "^ci", group = "ci" },
  { message = "^chore", group = "chores" },
  { message = ".*", group = "other" },
]

[remote.github]
owner = "bitsentry-ai"
repo = "bitsentry-monorepo"
